<svg width="1100" height="220" viewBox="0 0 1100 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Emby Migrator 工作流程</title>
  <desc id="desc">从旧 Emby 服务器导出元数据与图片，生成导出包，再导入到目标 Emby 服务器并生成报告。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#315CF6"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1140" height="260" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect x="1" y="1" width="1098" height="218" rx="24" fill="url(#bg)" stroke="#D7E0EF"/>
  <g filter="url(#shadow)">
    <g font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif">
      <rect x="42" y="78" width="118" height="64" rx="16" fill="white" stroke="#D6E0F0"/>
      <text x="101" y="105" text-anchor="middle" fill="#0F172A" font-size="15" font-weight="800">旧 Emby</text>
      <text x="101" y="126" text-anchor="middle" fill="#64748B" font-size="12">源服务器</text>

      <rect x="190" y="78" width="118" height="64" rx="16" fill="white" stroke="#D6E0F0"/>
      <text x="249" y="105" text-anchor="middle" fill="#0F172A" font-size="15" font-weight="800">选择媒体库</text>
      <text x="249" y="126" text-anchor="middle" fill="#64748B" font-size="12">按库导出</text>

      <rect x="338" y="78" width="130" height="64" rx="16" fill="white" stroke="#D6E0F0"/>
      <text x="403" y="104" text-anchor="middle" fill="#0F172A" font-size="15" font-weight="800">导出数据</text>
      <text x="403" y="126" text-anchor="middle" fill="#64748B" font-size="12">元数据 / 图片</text>

      <rect x="498" y="66" width="132" height="88" rx="18" fill="#EEF4FF" stroke="#9DB8FF"/>
      <text x="564" y="101" text-anchor="middle" fill="#1D4ED8" font-size="16" font-weight="850">导出包</text>
      <text x="564" y="124" text-anchor="middle" fill="#475569" font-size="12">/data/exports</text>

      <rect x="660" y="78" width="118" height="64" rx="16" fill="white" stroke="#D6E0F0"/>
      <text x="719" y="105" text-anchor="middle" fill="#0F172A" font-size="15" font-weight="800">目标 Emby</text>
      <text x="719" y="126" text-anchor="middle" fill="#64748B" font-size="12">新服务器</text>

      <rect x="808" y="78" width="118" height="64" rx="16" fill="white" stroke="#D6E0F0"/>
      <text x="867" y="105" text-anchor="middle" fill="#0F172A" font-size="15" font-weight="800">预检匹配</text>
      <text x="867" y="126" text-anchor="middle" fill="#64748B" font-size="12">确认命中</text>

      <rect x="956" y="78" width="104" height="64" rx="16" fill="#ECFDF5" stroke="#86EFAC"/>
      <text x="1008" y="105" text-anchor="middle" fill="#047857" font-size="15" font-weight="850">导入完成</text>
      <text x="1008" y="126" text-anchor="middle" fill="#64748B" font-size="12">报告 / 日志</text>
    </g>

    <g stroke="url(#primary)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M166 110H184"/>
      <path d="M178 104L184 110L178 116"/>
      <path d="M314 110H332"/>
      <path d="M326 104L332 110L326 116"/>
      <path d="M474 110H492"/>
      <path d="M486 104L492 110L486 116"/>
      <path d="M636 110H654"/>
      <path d="M648 104L654 110L648 116"/>
      <path d="M784 110H802"/>
      <path d="M796 104L802 110L796 116"/>
      <path d="M932 110H950"/>
      <path d="M944 104L950 110L944 116"/>
    </g>
  </g>
  <g font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif">
    <text x="42" y="42" fill="#0F172A" font-size="18" font-weight="850">工作流程</text>
    <text x="132" y="42" fill="#64748B" font-size="13">导出、预检、导入、报告一次完成</text>
  </g>
</svg>
